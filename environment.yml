name: lipread_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # PyTorch — change cudatoolkit version to match your GPU driver
  - pytorch>=2.1.0
  - torchvision>=0.16.0
  - pytorch-cuda=11.8          # use 12.1 for newer GPUs

  # Core numerics / data
  - numpy>=1.24
  - pandas>=2.0
  - openpyxl                   # for reading .xlsx files
  - scikit-learn>=1.3
  - scipy

  # Video / image
  - opencv>=4.8

  # Visualisation
  - matplotlib>=3.7
  - seaborn

  # Utilities
  - tqdm
  - pyyaml

  - pip:
    - mediapipe>=0.10.3        # MediaPipe — pip-only on most platforms
